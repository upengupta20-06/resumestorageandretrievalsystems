<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password · Resume Storage System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center">
      <div class="auth-logo"><i class="fa-solid fa-key"></i></div>
      <h4 class="font-display mb-1">Reset your password</h4>
      <p class="text-muted-c mb-4" style="font-size:13px;">Enter your email and we'll send a reset link</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2" style="border-radius: var(--radius-sm); font-size: 13px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>

          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" name="email" value="{{ email or '' }}" placeholder="you@company.com" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 text-white mb-3">Send Reset Link</button>
      <a href="{{ url_for('auth.login') }}" class="d-block text-center" style="font-size:13px;">
        <i class="fa-solid fa-arrow-left me-1"></i>Back to login
      </a>
    </form>
  </div>
</div>
</body>
</html>
